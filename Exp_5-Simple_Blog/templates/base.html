<!--
  base.html — Master layout template
  All other pages extend this file using Jinja2 template inheritance.
  Provides: navigation bar, page wrapper, footer, and CSS/font links.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Dynamic page title: child templates can override the 'title' block -->
  <title>{% block title %}Simple Blog{% endblock %}</title>

  <!-- Google Fonts: Playfair Display (headings) + Source Serif 4 (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Serif+4:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />

  <!-- Main stylesheet -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>

  <!-- ===== Navigation Bar ===== -->
  <nav class="navbar">
    <a href="{{ url_for('index') }}" class="nav-brand">📰 SimpleBlog</a>
    <div class="nav-links">
      <a href="{{ url_for('index') }}" class="nav-link">Home</a>
      <a href="{{ url_for('create') }}" class="nav-link nav-link--cta">+ New Post</a>
    </div>
  </nav>

  <!-- ===== Main Content Area ===== -->
  <!-- Child templates fill the 'content' block -->
  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <!-- ===== Footer ===== -->
  <footer class="footer">
    <p>Simple Blog &copy; 2026 &mdash; Built with Flask</p>
  </footer>

</body>
</html>
