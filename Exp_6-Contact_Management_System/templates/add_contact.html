{% extends "base.html" %}

{% block title %}Add Contact – Contact Manager{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Add <span>Contact</span></h1>
    <a href="{{ url_for('index') }}" class="btn btn-ghost">← Back</a>
</div>

<div class="card" style="max-width:560px;">
    <form method="POST" action="{{ url_for('add_contact') }}">

        <div class="form-group">
            <label for="name">Full Name *</label>
            <input type="text" id="name" name="name"
                   placeholder="e.g. Rahul Sharma"
                   value="{{ name or '' }}" required />
        </div>

        <div class="form-group">
            <label for="phone">Phone Number *</label>
            <input type="tel" id="phone" name="phone"
                   placeholder="e.g. 9876543210"
                   value="{{ phone or '' }}" required />
        </div>

        <div class="form-group">
            <label for="email">Email Address *</label>
            <input type="email" id="email" name="email"
                   placeholder="e.g. rahul@email.com"
                   value="{{ email or '' }}" required />
        </div>

        <div class="form-group">
            <label for="address">Address (optional)</label>
            <input type="text" id="address" name="address"
                   placeholder="e.g. 12 MG Road, Delhi"
                   value="{{ address or '' }}" />
        </div>

        <div style="display:flex; gap:.8rem; margin-top:1.5rem;">
            <button type="submit" class="btn btn-primary">✅ Save Contact</button>
            <a href="{{ url_for('index') }}" class="btn btn-ghost">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
