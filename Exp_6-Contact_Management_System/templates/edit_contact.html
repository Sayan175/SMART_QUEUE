{% extends "base.html" %}

{% block title %}Edit Contact – Contact Manager{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Edit <span>Contact</span></h1>
    <a href="{{ url_for('index') }}" class="btn btn-ghost">← Back</a>
</div>

<div class="card" style="max-width:560px;">
    <form method="POST" action="{{ url_for('edit_contact', contact_id=contact.id) }}">

        <div class="form-group">
            <label for="name">Full Name *</label>
            <input type="text" id="name" name="name"
                   value="{{ contact.name }}" required />
        </div>

        <div class="form-group">
            <label for="phone">Phone Number *</label>
            <input type="tel" id="phone" name="phone"
                   value="{{ contact.phone }}" required />
        </div>

        <div class="form-group">
            <label for="email">Email Address *</label>
            <input type="email" id="email" name="email"
                   value="{{ contact.email }}" required />
        </div>

        <div class="form-group">
            <label for="address">Address (optional)</label>
            <input type="text" id="address" name="address"
                   value="{{ contact.address or '' }}" />
        </div>

        <div style="display:flex; gap:.8rem; margin-top:1.5rem;">
            <button type="submit" class="btn btn-primary">💾 Update Contact</button>
            <a href="{{ url_for('index') }}" class="btn btn-ghost">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
